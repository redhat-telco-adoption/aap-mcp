---
- name: Configure AAP — MCP Demo
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - aap_config/inventories.yml
    - aap_config/job_templates.yml
  vars:
    controller_validate_certs: false
  tasks:
    - name: Apply inventory configuration
      ansible.builtin.include_role:
        name: infra.controller_configuration.inventories

    - name: Apply host configuration
      ansible.builtin.include_role:
        name: infra.controller_configuration.hosts

    - name: Create job templates
      ansible.controller.job_template:
        name: "{{ item.name }}"
        description: "{{ item.description | default('') }}"
        organization: "{{ item.organization }}"
        project: "{{ item.project }}"
        playbook: "{{ item.playbook }}"
        inventory: "{{ item.inventory }}"
        execution_environment: "{{ item.execution_environment | default(omit) }}"
        ask_variables_on_launch: "{{ item.ask_variables_on_launch | default(false) }}"
        extra_vars: "{{ item.extra_vars | default(omit) }}"
        validate_certs: false
        state: present
      loop: "{{ controller_job_templates }}"

    - name: Report completion
      ansible.builtin.debug:
        msg:
          - "AAP configuration complete!"
          - "Created: MCP Demo Inventory + localhost host"
          - "Created: 3 job templates (Hello World, System Info, Environment Report)"
