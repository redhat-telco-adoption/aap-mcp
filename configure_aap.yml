---
- name: Configure AAP — MCP Demo
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - aap_config/inventories.yml
    - aap_config/job_templates.yml
  vars:
    controller_validate_certs: false
  tasks:
    - name: Apply inventory configuration
      ansible.builtin.include_role:
        name: infra.controller_configuration.inventories

    - name: Apply host configuration
      ansible.builtin.include_role:
        name: infra.controller_configuration.hosts

    - name: Apply job template configuration
      ansible.builtin.include_role:
        name: infra.controller_configuration.job_templates

    - name: Report completion
      ansible.builtin.debug:
        msg:
          - "AAP configuration complete!"
          - "Created: MCP Demo Inventory + localhost host"
          - "Created: 3 job templates (Hello World, System Info, Environment Report)"
