---
- name: Cleanup AAP — remove all demo-created resources
  hosts: localhost
  connection: local
  gather_facts: false
  module_defaults:
    group/ansible.controller.controller:
      controller_host: "{{ controller_host }}"
      controller_username: "{{ controller_username }}"
      controller_password: "{{ controller_password }}"
      validate_certs: false
  tasks:
    - name: Remove demo job templates
      ansible.controller.job_template:
        name: "{{ item }}"
        state: absent
      loop:
        - "MCP Demo | Configure AAP"
        - "MCP Demo | Hello World"
        - "MCP Demo | System Info"
        - "MCP Demo | Environment Report"
        - "MCP Demo | Deploy Application"
        - "MCP Demo | Data Sync"
        - "MCP Demo | OS Patching"
        - "MCP Demo | Seed Job History"
        - "MCP Demo | Configure Database"

    - name: Remove demo inventory
      ansible.controller.inventory:
        name: MCP Demo Inventory
        organization: MCP Demo Org
        state: absent

    - name: Remove demo project
      ansible.controller.project:
        name: MCP Demo Project
        organization: MCP Demo Org
        state: absent

    - name: Remove demo execution environment
      ansible.controller.execution_environment:
        name: MCP Demo EE
        state: absent

    - name: Remove demo credentials
      ansible.controller.credential:
        name: "{{ item.name }}"
        credential_type: "{{ item.type }}"
        state: absent
      loop:
        - {name: "MCP Demo SSH Key", type: "Machine"}
        - {name: "MCP Demo Registry", type: "Container Registry"}

    - name: Report completion
      ansible.builtin.debug:
        msg: "Cleanup complete. Ready for next demo run."
